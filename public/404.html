<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | CODEX Tech Innovations</title>
  <meta name="robots" content="noindex" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0b1929;color:#fff;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .c{text-align:center;padding:2rem;max-width:500px}
    .h{font-size:clamp(72px,12vw,120px);font-weight:800;background:linear-gradient(135deg,#00ffb9,#00b4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:8px}
    .s{font-size:clamp(18px,3vw,24px);font-weight:600;color:#fff;margin-bottom:16px}
    .p{font-size:15px;color:#6b8199;line-height:1.7;margin-bottom:32px}
    .a{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#0e7f72,#12a896);color:#fff;padding:14px 32px;border-radius:9px;font-size:15px;font-weight:600;text-decoration:none;transition:all 0.25s ease}
    .a:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(14,127,114,0.4)}
  </style>
</head>
<body>
  <div class="c">
    <div class="h">404</div>
    <div class="s">Page Not Found</div>
    <p class="p">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/" class="a">← Back to Home</a>
  </div>
</body>
</html>
