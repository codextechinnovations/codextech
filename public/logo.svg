<svg viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="110" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="25" y1="25" x2="85" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ffb9"/>
      <stop offset="100%" stop-color="#00b4ff"/>
    </linearGradient>
    <clipPath id="hexClip">
      <polygon points="55,8 97,30 97,74 55,96 13,74 13,30"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g class="orbit" style="animation: spin 8s linear infinite; transform-origin: 55px 55px;">
    <circle cx="55" cy="55" r="51" stroke="rgba(0,255,185,0.15)" stroke-width="1" stroke-dasharray="6 10" fill="none"/>
    <circle cx="55" cy="4" r="3" fill="#00ffb9" opacity="0.7"/>
    <circle cx="55" cy="106" r="2" fill="#00b4ff" opacity="0.5"/>
  </g>
  <polygon class="hex-bg" points="55,10 95,32 95,74 55,96 15,74 15,32" fill="url(#hexGrad)" stroke="rgba(0,255,185,0.6)" stroke-width="1.5" style="animation: hexPulse 3s ease-in-out infinite;"/>
  <polygon points="55,22 83,37 83,67 55,82 27,67 27,37" fill="none" stroke="rgba(0,255,185,0.12)" stroke-width="1"/>
  <g stroke="rgba(0,255,185,0.2)" stroke-width="1" fill="none">
    <line x1="55" y1="10" x2="55" y2="22"/>
    <line x1="95" y1="32" x2="83" y2="37"/>
    <line x1="95" y1="74" x2="83" y2="67"/>
    <line x1="55" y1="96" x2="55" y2="82"/>
    <line x1="15" y1="74" x2="27" y2="67"/>
    <line x1="15" y1="32" x2="27" y2="37"/>
  </g>
  <g fill="rgba(0,255,185,0.5)">
    <circle cx="55" cy="21" r="2"/>
    <circle cx="83" cy="37" r="2"/>
    <circle cx="83" cy="67" r="2"/>
    <circle cx="55" cy="81" r="2"/>
    <circle cx="27" cy="67" r="2"/>
    <circle cx="27" cy="37" r="2"/>
  </g>
  <rect class="scanline" x="15" y="52" width="80" height="2" fill="url(#xGrad)" opacity="0.25" style="animation: scan 2.4s ease-in-out infinite;"/>
  <g filter="url(#glow)">
    <line x1="33" y1="35" x2="77" y2="75" stroke="url(#xGrad)" stroke-width="8" stroke-linecap="round"/>
    <line x1="77" y1="35" x2="33" y2="75" stroke="url(#xGrad)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="55" cy="55" r="4.5" fill="#0a1820" stroke="url(#xGrad)" stroke-width="1.5"/>
    <circle cx="55" cy="55" r="2" fill="url(#xGrad)"/>
  </g>
</svg>